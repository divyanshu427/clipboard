<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard — Quick Notes</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Clipboard</h1>
      <p class="subtitle">Your quick notes</p>
    </div>
    <button id="create-btn" class="create-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Create Text Box
    </button>
    <div class="sidebar-footer">
      <span id="box-count">0 notes</span>
    </div>
  </aside>

  <main class="main">
    <div id="empty-state" class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>No notes yet</p>
      <p class="empty-hint">Click <strong>Create Text Box</strong> to get started</p>
    </div>
    <div id="boxes-container" class="boxes-container"></div>
  </main>
</body>
</html>
